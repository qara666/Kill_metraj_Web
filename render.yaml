services:
  # Backend Service
  - type: web
    name: kill-metraj-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
    autoDeploy: true

  # Frontend Service (Static Site with SPA Rewrite)
  - type: static
    name: kill-metraj-frontend
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      # Fix for "Not Found" on refresh (SPA Fallback)
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: kill-metraj-backend
          property: url
    autoDeploy: true

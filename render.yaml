services:
  # Backend Service
  - type: web
    name: kill-metraj-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npx pm2-runtime start ecosystem.config.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
      - key: GRPC_PORT
        value: 50051
      - key: DASHBOARD_FETCH_INTERVAL
        value: 300000  # 5 minutes for production
      - key: DASHBOARD_DATA_RETENTION_DAYS
        value: 7
      - key: REDIS_ENABLED
        value: "true"
      - key: CDC_ENABLED
        value: "false" # Default to false on Render unless user sets up Kafka
      - key: DASHBOARD_MOCK_MODE
        value: "false"
      - key: EXTERNAL_API_URL
        value: "http://app.yaposhka.kh.ua:4999/api/v1/dashboard"
      - key: DASHBOARD_DEPARTMENT_ID
        value: "100000052"
      - key: REDIS_URL
        fromService:
          type: redis
          name: kill-metraj-redis
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: EXTERNAL_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true # Render will generate a random secret
      - key: KAFKA_BROKER
        sync: false # User provides if using external Kafka

  # Frontend Service
  - type: static
    name: kill-metraj-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    publishDir: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: kill-metraj-backend
          property: url

  # Redis Service
  - type: redis
    name: kill-metraj-redis
    plan: free
    ipAllowList: [] # Only allow internal Render traffic

version: "1"

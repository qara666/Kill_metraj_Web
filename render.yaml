services:
  # Backend Service
  - type: web
    name: kill-metraj-backend
    env: node
    plan: free # or starter
    region: frankfurt # update if needed
    buildCommand: cd backend && npm install
    startCommand: cd backend && node simple_server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: kill-metraj-db
          property: connectionString

  # Frontend Service (Static Site)
  - type: web
    name: kill-metraj-frontend
    env: static
    plan: free
    region: frankfurt
    buildCommand: cd frontend && npm install && npm run build
    publishPath: frontend/dist
    envVars:
      - key: VITE_BACKEND_URL
        fromService:
          type: web
          name: kill-metraj-backend
          property: host
        # Note: Render provides https://[host].onrender.com automatically

databases:
  - name: kill-metraj-db
    plan: free
    region: frankfurt

services:
  # Backend Service
  - type: web
    name: kill-metraj-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npx pm2-runtime start ecosystem.config.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
      - key: DASHBOARD_FETCH_INTERVAL
        value: 120000  # 2 minutes for production
      - key: DASHBOARD_DATA_RETENTION_DAYS
        value: 7
      - key: FRONTEND_URL
        fromService:
          type: static
          name: kill-metraj-frontend
          property: url
      - key: DATABASE_URL
        fromDatabase:
          name: kill-metraj-db
          property: connectionString
      - key: EXTERNAL_API_KEY
        sync: false  # User must provide this in dashboard

  # Frontend Service
  - type: static
    name: kill-metraj-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    publishDir: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: kill-metraj-backend
          property: url

databases:
  - name: kill-metraj-db
    plan: free
    databaseName: kill_metraj
    user: kill_metraj_user

version: "1"

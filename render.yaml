services:
  # Backend Service
  - type: web
    name: yapiko-auto-km-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node simple_server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: yapiko-auto-km-db
          property: connectionString

  # Frontend Service (Node.js Web Service for robustness)
  - type: web
    name: yapiko-auto-km-frontend
    env: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: VITE_API_URL
        value: https://yapiko-auto-km-backend.onrender.com
      - key: VITE_BACKEND_URL
        value: https://yapiko-auto-km-backend.onrender.com

databases:
  - name: yapiko-auto-km-db
    plan: free

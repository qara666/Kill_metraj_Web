services:
  # Backend Service
  - type: web
    name: yapiko-auto-km-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node simple_server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
      - key: GRPC_PORT
        value: 50051
      - key: DASHBOARD_FETCH_INTERVAL
        value: 300000  # 5 minutes for production
      - key: DASHBOARD_DATA_RETENTION_DAYS
        value: 7
      - key: REDIS_ENABLED
        value: "true"
      - key: CDC_ENABLED
        value: "false" # Default to false on Render unless user sets up Kafka
      - key: DASHBOARD_MOCK_MODE
        value: "false"
      - key: EXTERNAL_API_URL
        value: "http://app.yaposhka.kh.ua:4999/api/v1/dashboard"
      - key: DASHBOARD_API_URL
        value: "http://app.yaposhka.kh.ua:4999"
      - key: DASHBOARD_DEPARTMENT_ID
        value: "100000052"
      - key: REDIS_URL
        fromService:
          type: redis
          name: yapiko-auto-km-redis
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: EXTERNAL_API_KEY
        value: "KMFh23298&23201)8172^&21Vs@gfgsd"
      - key: JWT_SECRET
        generateValue: true # Render will generate a random secret
      - key: KAFKA_BROKER
        sync: false # User provides if using external Kafka

  # Frontend Service (Static Site is free and optimized for Vite)
  - type: static_site
    name: yapiko-auto-km-frontend-static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false # Set this to your backend URL (e.g., https://your-backend.onrender.com) after deployment

  # Redis Service
  - type: redis
    name: yapiko-auto-km-redis
    plan: free
    ipAllowList: [] # Only allow internal Render traffic

version: "1"

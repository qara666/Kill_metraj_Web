services:
  # Backend Service
  - type: web
    name: kill-metraj-backend
    env: node
    plan: free # or starter
    region: frankfurt
    buildCommand: cd backend && npm install
    startCommand: cd backend && node simple_server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: kill-metraj-db
          property: connectionString

  # Frontend Service (Now defined as Web Service for robustness)
  - type: web
    name: kill-metraj-frontend
    env: node
    plan: free
    region: frankfurt
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: VITE_BACKEND_URL
        fromService:
          type: web
          name: kill-metraj-backend
          property: host

databases:
  - name: kill-metraj-db
    plan: free
    region: frankfurt
